<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PPF Car Visualizer</title>

    <style>
        body {
            margin: 0;
            background: #050509;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
        }

        #controls, #rightPanel {
            background: #111119;
            padding: 16px;
            box-sizing: border-box;
        }

        #controls {
            width: 260px;
            border-right: 2px solid #1f1f2a;
        }

        #rightPanel {
            width: 220px;
            border-left: 2px solid #1f1f2a;
        }

        #viewer {
            flex: 1;
            position: relative;
        }

        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #181824;
            border: 1px solid #33334a;
            color: white;
            border-radius: 6px;
            font-size: 15px;
        }

        .colorBtn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 6px;
            transition: 0.15s;
            color: white;
        }

        .colorBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .matte { background: #555; }
        .satin { background: #888; }
        .chrome { background: linear-gradient(45deg, #eee, #aaa, #fff); color: black; }

        /* موبايل: نخلي كلشي فوق بعض */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #controls, #rightPanel {
                width: 100%;
                border: none;
                border-bottom: 1px solid #1f1f2a;
            }
            #viewer {
                width: 100%;
                height: calc(100vh - 260px);
            }
        }

        @media (min-width: 769px) {
            #viewer {
                height: 100vh;
            }
        }
    </style>
</head>

<body>

<div id="controls">
    <h2>Car Selector</h2>

    <select id="carBrand">
        <option value="">Select Brand</option>
        <option value="skoda">Skoda</option>
    </select>

    <select id="carModel">
        <option value="">Select Model</option>
    </select>
</div>

<div id="viewer"></div>

<div id="rightPanel">
    <h3>PPF Types</h3>
    <button class="colorBtn matte" data-color="matte">Matte</button>
    <button class="colorBtn satin" data-color="satin">Satin</button>
    <button class="colorBtn chrome" data-color="chrome">Chrome</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
const carModels = {
    skoda: {
        "Superb 2016": "skoda/models/scene.gltf" // عدّل المسار حسب ملفاتك
    }
};

const brandSelect = document.getElementById("carBrand");
const modelSelect = document.getElementById("carModel");

brandSelect.addEventListener("change", function () {
    const brand = this.value;
    modelSelect.innerHTML = "<option value=''>Select Model</option>";

    if (carModels[brand]) {
        Object.keys(carModels[brand]).forEach(model => {
            modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
        });
    }
});

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x050509);

let camera = new THREE.PerspectiveCamera(
    50,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

let renderer = new THREE.WebGLRenderer({ antialias: true });
resizeRenderer();
document.getElementById("viewer").appendChild(renderer.domElement);

/* إضاءة */
const hemi = new THREE.HemisphereLight(0xffffff, 0x222233, 1.4);
scene.add(hemi);

const dir = new THREE.DirectionalLight(0xffffff, 1.3);
dir.position.set(5, 10, 7);
dir.castShadow = true;
scene.add(dir);

/* أرضية */
const floorGeo = new THREE.CircleGeometry(6, 64);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x111118,
    roughness: 0.9,
    metalness: 0.1
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

/* Environment */
const env = new THREE.CubeTextureLoader().load([
    "https://threejs.org/examples/textures/cube/Bridge2/posx.jpg",
    "https://threejs.org/examples/textures/cube/Bridge2/negx.jpg",
    "https://threejs.org/examples/textures/cube/Bridge2/posy.jpg",
    "https://threejs.org/examples/textures/cube/Bridge2/negy.jpg",
    "https://threejs.org/examples/textures/cube/Bridge2/posz.jpg",
    "https://threejs.org/examples/textures/cube/Bridge2/negz.jpg"
]);
scene.environment = env;

let car;
const loader = new THREE.GLTFLoader();

/* تحميل السيارة */
modelSelect.addEventListener("change", function () {
    const brand = brandSelect.value;
    const model = this.value;
    if (!brand || !model) return;

    if (car) {
        scene.remove(car);
        car = null;
    }

    loader.load(
        carModels[brand][model],
        function (gltf) {
            car = gltf.scene;
            car.scale.set(1.15, 1.15, 1.15);

            const box = new THREE.Box3().setFromObject(car);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // توسيط السيارة فوق الأرضية
            car.position.set(
                -center.x,
                -center.y + size.y * 0.25,
                -center.z
            );

            const maxDim = Math.max(size.x, size.y, size.z);

            // مسافة ديناميكية حسب حجم الشاشة
            const isMobile = window.innerWidth <= 768;
            const distance = maxDim * (isMobile ? 0.8 : 1.0);

            car.position.z -= distance;

            camera.position.set(
                distance * 0.55,
                distance * 0.30,
                distance * 0.95
            );
            camera.lookAt(0, 0, 0);

            car.traverse(obj => {
                if (obj.isMesh && obj.material) {
                    obj.castShadow = true;
                    obj.receiveShadow = true;
                    obj.material.envMap = env;
                    obj.material.envMapIntensity = 0.9;
                }
            });

            scene.add(car);
        },
        undefined,
        err => console.error("Error loading model:", err)
    );
});

/* PPF */
document.querySelectorAll(".colorBtn").forEach(btn => {
    btn.addEventListener("click", function () {
        if (!car) return;
        const type = this.dataset.color;

        car.traverse(child => {
            if (child.isMesh && child.material) {
                if (type === "matte") {
                    child.material.metalness = 0.1;
                    child.material.roughness = 0.9;
                    child.material.envMapIntensity = 0.5;
                }
                if (type === "satin") {
                    child.material.metalness = 0.4;
                    child.material.roughness = 0.5;
                    child.material.envMapIntensity = 0.8;
                }
                if (type === "chrome") {
                    child.material.metalness = 1.0;
                    child.material.roughness = 0.08;
                    child.material.envMapIntensity = 1.2;
                }
                child.material.needsUpdate = true;
            }
        });
    });
});

/* أنيميشن */
function animate() {
    requestAnimationFrame(animate);
    if (car) car.rotation.y += 0.002;
    renderer.render(scene, camera);
}
animate();

/* ريسايز */
window.addEventListener("resize", () => {
    resizeRenderer();
});

function resizeRenderer() {
    const viewer = document.getElementById("viewer");
    const width = viewer.clientWidth || window.innerWidth;
    const height = viewer.clientHeight || window.innerHeight;

    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
}
</script>

</body>
</html>
