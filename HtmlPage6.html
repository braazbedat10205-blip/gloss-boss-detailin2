        /* شبكة المنتجات */
        .products {

            padding: 10px;
        }

        /* كل منتج */
        .product {
            background: #1c1c1c;
            width: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px #000;
            transition: 0.3s;
        }

            .product:hover {
                transform: scale(1.05);
            }

            .product img {
                width: 100%;
                height: 200px;
                object-fit: cover;
            }

            .product h3 {
                margin: 10px 0;
            }

        .price {
            color: #25D366;
            font-size: 18px;
            margin-bottom: 10px;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

            button:hover {
                background: #1ebe57;
            }
    </style>
</head>
<script>
    let isArabic = true;

    function toggleLanguage() {
        isArabic = !isArabic;

        if (isArabic) {
            document.documentElement.lang = "ar";
            document.body.dir = "rtl";
            location.reload(); // يرجع عربي
        } else {
            document.documentElement.lang = "he";
            document.body.dir = "rtl";
            translatePage();
        }
    }

    function translatePage() {

        const map = [
            ["المنتجات - Gloss Boss", "מוצרים - Gloss Boss"],
            ["منتجاتنا", "המוצרים שלנו"],
            ["العودة للصفحة الرئيسية", "חזרה לדף הבית"],
            ["اطلب الآن", "הזמן עכשיו"]
        ];

        document.querySelectorAll("*").forEach(el => {

            if (el.children.length === 0) {
                let text = el.innerText;

                if (text) {
                    map.forEach(item => {
                        text = text.replaceAll(item[0], item[1]);
                    });
                    el.innerText = text;
                }
            }

        });
    }
</script>
