<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1320">
  <title>Products - Gloss Boss</title>
  <link rel="stylesheet" href="StyleSheet2.css">
</head>
<body>
  <div class="pageShell">
    <div class="siteTopbar">
      <div class="topbarInner">
        <div class="brandLockup">
          <div class="brandMark">GB</div>
          <div class="brandText">
            <strong>Gloss Boss Detailing</strong>
            <span data-ar="منتجات وعناية للطلب السريع" data-he="מוצרים וטיפוח להזמנה מהירה">منتجات وعناية للطلب السريع</span>
          </div>
        </div>
        <div class="navLinks">
          <a class="navPill" href="index.html" data-ar="الرئيسية" data-he="דף הבית">الرئيسية</a>
          <a class="navPill" href="HtmlPage5.html" data-ar="أعمالنا" data-he="העבודות שלנו">أعمالنا</a>
          <a class="navPill" href="ppf-preview.html" data-ar="معاينة PPF" data-he="תצוגת PPF">معاينة PPF</a>
          <button type="button" onclick="toggleLanguage()" class="lang-btn" data-ar="العربية / עברית" data-he="עברית / العربية">العربية / עברית</button>
        </div>
      </div>
    </div>

    <section class="pageHero">
      <h1 data-ar="منتجاتنا" data-he="המוצרים שלנו">منتجاتنا</h1>
    </section>

    <section class="sectionCard">
      <div class="sectionHeader">
        <div>
          <h2 data-ar="كتالوج المنتجات" data-he="קטלוג מוצרים">كتالوج المنتجات</h2>
        </div>
      </div>

      <div id="productsGrid" class="cardsGrid productsGrid">
        <article class="productCard productLoading">
          <div class="productMedia"></div>
          <h3 data-ar="يتم تحميل المنتجات..." data-he="טוען מוצרים...">يتم تحميل المنتجات...</h3>
        </article>
      </div>
    </section>

    <section class="ctaCard">
      <div>
        <h3 data-ar="بدك مساعدة بالاختيار؟" data-he="צריך עזרה בבחירה?">بدك مساعدة بالاختيار؟</h3>
        <p data-ar="ارسل اسم المنتج على الواتساب وبنساعدك بسرعة." data-he="שלח את שם המוצר בוואטסאפ ונעזור לך במהירות.">ارسل اسم المنتج على الواتساب وبنساعدك بسرعة.</p>
      </div>
      <div class="cardActions">
        <a id="productsWhatsappLink" href="https://wa.me/972533044605?text=مرحبا%20عندي%20استفسار%20عن%20المنتجات" target="_blank" class="btnWhatsapp" data-ar="اسأل على الواتساب" data-he="שאל בוואטסאפ">اسأل على الواتساب</a>
        <a href="index.html" class="btnGhost" data-ar="رجوع للرئيسية" data-he="חזרה לדף הבית">رجوع للرئيسية</a>
      </div>
    </section>

    <footer class="siteFooter">© 2026 Gloss Boss Detailing</footer>
  </div>

  <script type="module">
    import {
      collection,
      limit,
      onSnapshot,
      orderBy,
      query,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { db } from "./firebase-config.js";

    const productsGrid = document.getElementById("productsGrid");
    const whatsappNumber = "972533044605";
    let latestProducts = [];
    let currentLang = localStorage.getItem("lang") || "ar";

    const copy = {
      ar: {
        available: "متوفر",
        offer: "عرض",
        order: "اطلب الآن",
        loadErrorTitle: "تعذر تحميل المنتجات",
        loadErrorText: "حدث الصفحة، وإذا استمرت المشكلة تواصل معنا على الواتساب.",
        emptyTitle: "لا يوجد منتجات بعد",
        emptyText: "سيتم إضافة المنتجات قريبًا.",
        whatsappQuestion: "مرحبا عندي استفسار عن المنتجات",
        whatsappOrder: (title) => `مرحبا، أريد طلب ${title}`,
      },
      he: {
        available: "זמין",
        offer: "מבצע",
        order: "הזמן עכשיו",
        loadErrorTitle: "לא ניתן לטעון מוצרים",
        loadErrorText: "רענן את הדף, ואם הבעיה נמשכת צור איתנו קשר בוואטסאפ.",
        emptyTitle: "אין מוצרים עדיין",
        emptyText: "המוצרים יתווספו בקרוב.",
        whatsappQuestion: "שלום, יש לי שאלה לגבי המוצרים",
        whatsappOrder: (title) => `שלום, אני רוצה להזמין ${title}`,
      },
    };
    copy.ar.available = "متوفر";
    copy.ar.unavailable = "غير متوفر";
    copy.he.available = "זמין";
    copy.he.unavailable = "לא זמין";

    window.toggleLanguage = function toggleLanguage() {
      applyLanguage(currentLang === "ar" ? "he" : "ar");
    };

    function applyLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.body.dir = "rtl";
      document.querySelectorAll("[data-ar]").forEach((element) => {
        const nextValue = element.dataset[lang];
        if (typeof nextValue === "string") {
          element.textContent = nextValue;
        }
      });
      const question = encodeURIComponent(copy[lang].whatsappQuestion);
      document.getElementById("productsWhatsappLink").href = `https://wa.me/${whatsappNumber}?text=${question}`;
      localStorage.setItem("lang", lang);
      renderProducts(latestProducts);
    }

    const productsQuery = query(collection(db, "products"), orderBy("createdAt", "desc"), limit(60));

    onSnapshot(
      productsQuery,
      (snapshot) => {
        latestProducts = snapshot.docs.map((documentSnapshot) => ({
          id: documentSnapshot.id,
          ...documentSnapshot.data(),
        }));

        renderProducts(latestProducts);
      },
      (error) => {
        console.error(error);
        productsGrid.innerHTML = `
          <article class="productCard">
            <h3>${copy[currentLang].loadErrorTitle}</h3>
            <p>${copy[currentLang].loadErrorText}</p>
          </article>
        `;
      },
    );

    function renderProducts(products) {
      const visibleProducts = products.filter((product) => product.imageUrl && product.title);

      if (!visibleProducts.length) {
        productsGrid.innerHTML = `
          <article class="productCard">
            <h3>${copy[currentLang].emptyTitle}</h3>
            <p>${copy[currentLang].emptyText}</p>
          </article>
        `;
        return;
      }

      productsGrid.innerHTML = visibleProducts
        .map((product) => {
          const title = escapeHtml(product.title);
          const imageUrl = escapeHtml(product.imageUrl);
          const productNumber = escapeHtml(product.productNumber || "");
          const price = escapeHtml(product.price || "");
          const offerText = escapeHtml(product.offerText || copy[currentLang].offer);
          const isAvailable = product.available !== false;
          const availabilityText = isAvailable ? copy[currentLang].available : copy[currentLang].unavailable;
          const whatsappText = encodeURIComponent(copy[currentLang].whatsappOrder(product.title));

          return `
            <article class="productCard">
              <div class="productMedia">
                <img src="${imageUrl}" alt="${title}" loading="lazy" decoding="async">
              </div>
              <span class="productBadge ${isAvailable ? "" : "productUnavailableBadge"}">${availabilityText}</span>
              ${product.offerEnabled ? `<span class="productBadge productOfferBadge">${offerText}</span>` : ""}
              <h3>${title}</h3>
              ${productNumber || price ? `
                <div class="productMeta">
                  ${productNumber ? `<span class="productBadge">${productNumber}</span>` : ""}
                  ${price ? `<span class="priceTag">${price}</span>` : ""}
                </div>
              ` : ""}
              ${isAvailable
                ? `<a href="https://wa.me/${whatsappNumber}?text=${whatsappText}" target="_blank" class="order-btn">${copy[currentLang].order}</a>`
                : `<span class="order-btn orderDisabled">${availabilityText}</span>`
              }
            </article>
          `;
        })
        .join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    applyLanguage(currentLang);
  </script>
</body>
</html>
